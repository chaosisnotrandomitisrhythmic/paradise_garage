<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #24292f;
      --muted: #656d76;
      --border: #d0d7de;
      --code-bg: #f6f8fa;
      --link: #0969da;
      --header-bg: #24292f;
      --header-text: #ffffff;
      --max-width: 1080px;
      --accent: #f78166;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    /* Header */
    .site-header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 16px 0;
      border-bottom: 3px solid var(--accent);
    }
    .site-header .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-header a { color: var(--header-text); text-decoration: none; }
    .site-title { font-size: 20px; font-weight: 600; }
    .site-nav a {
      margin-left: 24px;
      font-size: 14px;
      opacity: 0.85;
    }
    .site-nav a:hover { opacity: 1; }

    /* Main content */
    .content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Typography */
    h1 { font-size: 32px; font-weight: 600; margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    h2 { font-size: 24px; font-weight: 600; margin: 40px 0 16px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    h3 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; }
    h4 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; }
    p { margin: 0 0 16px; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* Lists */
    ul, ol { margin: 0 0 16px; padding-left: 2em; }
    li { margin: 4px 0; }
    li > ul, li > ol { margin: 4px 0 4px; }

    /* Code */
    code {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 85%;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
    }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
      line-height: 1.45;
    }
    pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px;
      font-size: 14px;
    }
    th, td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    th { background: var(--code-bg); font-weight: 600; }

    /* Blockquotes */
    blockquote {
      border-left: 4px solid var(--border);
      padding: 4px 16px;
      margin: 0 0 16px;
      color: var(--muted);
    }

    /* Diagrams */
    .diagram {
      margin: 24px 0 32px;
      text-align: center;
    }
    .diagram svg {
      max-width: 100%;
      height: auto;
    }
    .diagram figcaption {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
    }

    /* Page cards (home page) */
    .page-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    .page-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .page-card:hover {
      border-color: var(--link);
      text-decoration: none;
    }
    .page-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--link);
    }
    .page-card span {
      font-size: 14px;
      color: var(--muted);
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .site-footer .wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/equipment' | relative_url }}">Equipment</a>
        <a href="{{ '/desk' | relative_url }}">Desk Design</a>
        <a href="{{ '/inspiration' | relative_url }}">Inspiration</a>
        <a href="{{ '/research' | relative_url }}">Research</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      Paradise Garage &middot; Andreas & Ola &middot; <a href="https://github.com/chaosisnotrandomitisrhythmic/paradise_garage">GitHub</a>
    </div>
  </footer>

</body>
</html>
